<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiss moq</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pacifico&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(to bottom, #2c3e50, #fd746c, #ff9068);
        }

        /* The moving cloud text */
        .sky-text-container {
            position: absolute;
            top: 20%;
            width: 100%;
            text-align: center;
            z-index: 1;
            pointer-events: none;
        }

        .cloud-msg {
            font-family: 'Pacifico', cursive;
            font-size: 60px;
            color: rgba(255, 255, 255, 0.8);
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            filter: blur(1px);
            display: inline-block;
            animation: floatText 6s ease-in-out infinite alternate;
        }

        @keyframes floatText {
            from { transform: translateY(0) scale(1); opacity: 0.7; }
            to { transform: translateY(-20px) scale(1.05); opacity: 0.9; }
        }

        /* The Sun */
        .sun {
            position: absolute;
            bottom: 25%;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, #fff3b0, #ff9d00);
            border-radius: 50%;
            box-shadow: 0 0 60px rgba(255, 157, 0, 0.8);
            animation: sunSet 20s ease-in-out infinite alternate;
        }

        @keyframes sunSet {
            from { transform: translate(-50%, 0); filter: brightness(1.2); }
            to { transform: translate(-50%, 100px); filter: brightness(0.8); }
        }

        /* Landscape */
        .hill {
            position: absolute;
            bottom: 0;
            width: 150%;
            height: 30%;
            background: #1a2a1a;
            border-radius: 50% 50% 0 0;
        }
        .hill-1 { left: -25%; bottom: -5%; height: 35%; background: #0d1a0d; z-index: 3; }
        .hill-2 { right: -25%; bottom: -2%; height: 25%; background: #1a2a1a; z-index: 2; }

        .tree {
            position: absolute;
            bottom: 20%;
            left: 15%;
            width: 10px;
            height: 150px;
            background: #000;
            z-index: 4;
        }
        .tree::before {
            content: '';
            position: absolute;
            top: -60px;
            left: -50px;
            width: 110px;
            height: 110px;
            background: #000;
            border-radius: 40% 60% 50% 50%;
            box-shadow: 20px -10px 0 #000, -20px -5px 0 #000;
            animation: sway 4s ease-in-out infinite alternate;
        }

        /* Flowers */
        .flower-container {
            position: absolute;
            bottom: 5%;
            width: 100%;
            height: 100px;
            z-index: 5;
            display: flex;
            justify-content: space-around;
        }

        .flower {
            width: 4px;
            height: 40px;
            background: #0a3d0a;
            position: relative;
            transform-origin: bottom;
            animation: sway 3s ease-in-out infinite alternate;
        }

        .flower::after {
            content: '';
            position: absolute;
            top: -10px;
            left: -8px;
            width: 20px;
            height: 20px;
            background: #e91e63;
            border-radius: 50%;
            box-shadow: 0 0 10px #ff4081;
        }

        .flower:nth-child(even)::after { background: #f4d03f; box-shadow: 0 0 10px #f4d03f; }

        @keyframes sway {
            from { transform: rotate(-5deg); }
            to { transform: rotate(5deg); }
        }

        .water {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 10%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="sky-text-container">
        <div class="cloud-msg">Ang pogi ko, Jep</div>
    </div>

    <div class="sun"></div>
    
    <div class="hill hill-2"></div>
    <div class="hill hill-1"></div>

    <div class="tree"></div>

    <div class="flower-container">
        <div class="flower" style="animation-delay: 0.1s"></div>
        <div class="flower" style="animation-delay: 0.5s"></div>
        <div class="flower" style="animation-delay: 0.3s"></div>
        <div class="flower" style="animation-delay: 0.8s"></div>
        <div class="flower" style="animation-delay: 0.2s"></div>
        <div class="flower" style="animation-delay: 1s"></div>
    </div>

    <div class="water"></div>

</body>
</html>
